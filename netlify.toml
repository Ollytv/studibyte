# netlify.toml — StudiByte production deployment configuration

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── SPA redirect ──────────────────────────────────────────────────────────────
# Serve sitemap directly
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Serve robots.txt directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers — applied to every response ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent the app from being embedded in iframes (clickjacking protection)
    X-Frame-Options = "DENY"

    # Stop browsers from MIME-sniffing the content type
    X-Content-Type-Options = "nosniff"

    # Control how much referrer info is sent to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict access to browser features this app does not use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Force HTTPS for 2 years; include subdomains; preload-ready
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # ── Content Security Policy ────────────────────────────────────────────
    # Explicitly allowlists every external resource the app legitimately uses.
    # Everything not listed is blocked. This is the primary XSS mitigation.
    #
    # 'unsafe-inline' for scripts is required by Firebase SDK internals and
    # Framer Motion — revisit when those dependencies are updated.
    # 'unsafe-inline' for styles is required by Tailwind's runtime class generation.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://fcm.googleapis.com https://identitytoolkit.googleapis.com https://generativelanguage.googleapis.com; worker-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';"

# ── Static asset caching ──────────────────────────────────────────────────────
# Vite appends a content hash to JS and CSS filenames on every build,
# so immutable caching is safe — a new deployment = new filename = cache bust.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Service Worker — must never be cached ─────────────────────────────────────
# The SW file has no content hash. If the browser caches a stale SW, push
# notifications and PWA updates break. Always serve fresh.
[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control  = "no-cache, no-store, must-revalidate"
    Content-Type   = "application/javascript"

# ── Vite PWA generated SW ─────────────────────────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type  = "application/javascript"

# ── PWA manifest ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json"